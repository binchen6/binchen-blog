<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#e8d5a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- 外圆环 -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#1a3a3a" stroke-width="1" opacity="0.4"/>
  <circle cx="150" cy="150" r="135" fill="none" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 刻度 -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  <circle cx="150" cy="150" r="100" fill="none" stroke="#1a3a3a" stroke-width="0.3" opacity="0.2"/>
  
  <!-- 方向线 -->
  <line x1="150" y1="10" x2="150" y2="290" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="150" x2="290" y2="150" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  <line x1="44" y1="44" x2="256" y2="256" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  <line x1="256" y1="44" x2="44" y2="256" stroke="#1a3a3a" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 方向标记点 -->
  <circle cx="150" cy="20" r="3" fill="#c9a84c" opacity="0.8"/>
  <circle cx="150" cy="280" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="20" cy="150" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="280" cy="150" r="3" fill="#c9a84c" opacity="0.6"/>
  
  <!-- 中心 -->
  <circle cx="150" cy="150" r="8" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
  <circle cx="150" cy="150" r="3" fill="#c9a84c" opacity="0.9"/>
  
  <!-- 指针 -->
  <polygon points="150,70 155,150 150,130 145,150" fill="url(#bronzeGrad)" opacity="0.9"/>
  <polygon points="150,230 155,150 150,170 145,150" fill="#1a3a3a" opacity="0.6"/>
  
  <!-- 装饰文字 -->
  <text x="150" y="45" text-anchor="middle" font-family="serif" font-size="12" fill="#c9a84c" opacity="0.7">北</text>
  <text x="150" y="265" text-anchor="middle" font-family="serif" font-size="12" fill="#c9a84c" opacity="0.7">南</text>
  <text x="35" y="155" text-anchor="middle" font-family="serif" font-size="12" fill="#c9a84c" opacity="0.7">西</text>
  <text x="265" y="155" text-anchor="middle" font-family="serif" font-size="12" fill="#c9a84c" opacity="0.7">东</text>
  
  <!-- 外圈装饰点 -->
  <circle cx="150" cy="50" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="150" cy="250" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="50" cy="150" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="250" cy="150" r="1.5" fill="#c9a84c" opacity="0.5"/>
</svg>